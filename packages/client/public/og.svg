<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ヘルパゴス — 無人島ニセ協力サバイバル">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f3a"/>
      <stop offset="55%" stop-color="#244a57"/>
      <stop offset="100%" stop-color="#0c3a47"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="100%" stop-color="#ffb24d"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d6e84"/>
      <stop offset="100%" stop-color="#0a2e39"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <circle cx="930" cy="180" r="96" fill="url(#sun)" opacity="0.92"/>
  <rect x="0" y="392" width="1200" height="238" fill="url(#sea)"/>
  <path d="M0 410 q150 -28 300 0 t300 0 t300 0 t300 0 V630 H0 Z" fill="#11505f" opacity="0.7"/>
  <path d="M0 446 q150 -24 300 0 t300 0 t300 0 t300 0 V630 H0 Z" fill="#0a3a47" opacity="0.85"/>
  <!-- 島 -->
  <ellipse cx="360" cy="430" rx="170" ry="40" fill="#d9be84"/>
  <path d="M360 430 q-10 -96 -52 -126 q66 22 52 126" fill="#3f8f5f"/>
  <path d="M360 430 q12 -104 60 -122 q-74 18 -60 122" fill="#4fa06c"/>
  <rect x="352" y="312" width="14" height="120" rx="6" fill="#7c4f2e"/>
