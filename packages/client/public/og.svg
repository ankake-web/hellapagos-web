  <g transform="translate(820 452)">
    <rect x="0" y="0" width="120" height="24" rx="6" fill="#7c4f2e"/>
    <rect x="0" y="-6" width="18" height="38" rx="4" fill="#5e3a20"/>
    <rect x="34" y="-6" width="18" height="38" rx="4" fill="#5e3a20"/>
    <rect x="68" y="-6" width="18" height="38" rx="4" fill="#5e3a20"/>
    <rect x="100" y="-6" width="18" height="38" rx="4" fill="#5e3a20"/>
    <rect x="54" y="-78" width="10" height="78" fill="#9c6b3e"/>
    <path d="M64 -78 L120 -42 L64 -28 Z" fill="#eae0cf"/>
  </g>
  <text x="80" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="700" fill="#f4f1ea">ヘルパゴス</text>
  <text x="84" y="240" font-family="system-ui, sans-serif" font-size="40" fill="#d9be84">無人島ニセ協力サバイバル</text>
  <text x="84" y="300" font-family="system-ui, sans-serif" font-size="30" fill="#cfe3ea">嵐が来る前に、いかだで脱出せよ。</text>
