# Fly.io 設定（https://fly.io）。`app` 名は `fly launch` 時に一意なものへ変更すること。
app = "hellapagos-change-me"
primary_region = "nrt" # 東京。最寄りのリージョンに変更可

[build]
# Dockerfile を自動使用

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  # WebSocket(Socket.IO) は http_service 経由で wss として透過される

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# ランキングを永続化する場合は Volume を作成しマウントする：
#   fly volumes create hellapagos_data --size 1 --region nrt
# [mounts]
#   source = "hellapagos_data"
#   destination = "/app/packages/server/data"
